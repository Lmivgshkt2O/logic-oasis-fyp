schemaVersion: quiz-attempt-features-v2
sourceContract: attempt-evidence-v2
trustedAttemptGate:
  finalizationStatus: finalized
  validationStatus: finalized
  dataSource: runtime_callable
trustedResponseGate:
  validationStatus: validated
finalEvaluationProvenance:
  - real
developmentOnlyProvenance:
  - emulator_verified
rejectedProvenance:
  - seed_demo
  - synthetic_test
features:
  - correct_rate
  - mean_response_time_ms
excludedFeatures:
  - total_questions # fixed at five in the FYP1 quiz
  - correct_count # duplicates correct_rate
  - mean_hint_count # hint interaction is not implemented in FYP1
  - hint_count
  - next_attempt_score
  - next_attempt_correct_rate
  - next_bank
  - future_mastery
  - raw_answer_text
  - raw_question_text
  - answer_key
  - student_id
identity:
  studentKey: sha256(namespace:salt:studentId)
  rawStudentIdAllowedInExport: false
lifecycle:
  initialStatus: candidate
  activeRuntimeStatus: promoted
  automaticRetrainingAfterQuiz: false
